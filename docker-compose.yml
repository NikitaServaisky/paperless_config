services:
  paperless-redis:
    image: redis:7
    container_name: paperless-redis
    restart: always
    networks:
      - internal-net

  paperless-db:
    image: mariadb:10.11
    container_name: paperless-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${PAPERLESS_DB_ROOT_PASS}
      - MYSQL_DATABASE=${PAPERLESS_DB_NAME}
      - MYSQL_USER=${PAPERLESS_DB_USER}
      - MYSQL_PASSWORD=${PAPERLESS_DB_PASS}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - internal-net

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: always
    depends_on:
      - paperless-db
      - paperless-redis
    networks:
      - internal-net
    volumes:
      - ./data:/usr/src/paperless/data
      - ./export:/usr/src/paperless/export
      # paperless must sit on the path of nextcloud to scan all files when i upload
      - /mnt/storage/media/nextcloud/userdata:/usr/src/paperless/consume
      - /mnt/storage/media/nextcloud/userdata:/usr/src/paperless/media
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBENGINE: mariadb
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBUSER: ${PAPERLESS_DB_USER}
      PAPERLESS_DBPASS: ${PAPERLESS_DB_PASS}
      PAPERLESS_DBNAME: ${PAPERLESS_DB_NAME}
      PAPERLESS_OCR_LANGUAGES: ${PAPERLESS_OCR_LANGUAGES}
      PAPERLESS_OCR_LANGUAGE: ${PAPERLESS_OCR_LANGUAGE}
      PAPERLESS_TIME_ZONE: Asia/Jerusalem
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_CSRF_TRUSTED_ORIGINS: ${PAPERLESS_CSRF_TRUSTED_ORIGINS}
      
      # settings of OCR 
      PAPERLESS_CONSUMER_DELETE_ON_SUCCESS: "false" # do not remove everything
      PAPERLESS_CONSUMER_RECURSIVE: "true"           # work with all directories
      PAPERLESS_CONSUMER_IGNORE_DUPLICATES: "true"   # do not process two times
      PAPERLESS_OCR_MODE: "redo"                     # create text layer into the pdf (Searchable PDF)
      PAPERLESS_OCR_USER_ARGS: '{"oem": 1, "psm": 3}' # valid for handwriting
      PAPERLESS_OCR_DESKEW: "true"                   # straightens curved pages
      PAPERLESS_OCR_ROTATE_PAGES: "true"             # automatically rotate pages if needed
      # saves processing file in same path and name
      PAPERLESS_FILENAME_FORMAT: "{path}/{title}"

networks:
  internal-net:
    external: true
    name: nextcloud-net