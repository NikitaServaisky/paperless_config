services:
  paperless-redis:
    image: redis:7
    container_name: paperless-redis
    restart: always
    networks:
      - internal-net

  paperless-db:
    image: mariadb:10.11
    container_name: paperless-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${PAPERLESS_DB_ROOT_PASS}
      - MYSQL_DATABASE=${PAPERLESS_DB_NAME}
      - MYSQL_USER=${PAPERLESS_DB_USER}
      - MYSQL_PASSWORD=${PAPERLESS_DB_PASS}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - internal-net

  # Gotenberg: Required for converting Office docs (Docx, Xlsx) to PDF
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: paperless-gotenberg
    restart: always
    command:
      - "gotenberg"
      - "--modules-libreoffice-disable-check-update"
    networks:
      - internal-net

  # Tika: Extracts text from Office documents and other complex formats
  tika:
    image: apache/tika:latest
    container_name: paperless-tika
    restart: always
    networks:
      - internal-net

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: always
    depends_on:
      - paperless-db
      - paperless-redis
      - gotenberg
      - tika
    networks:
      - internal-net
    volumes:
      - ./data:/usr/src/paperless/data
      - ./export:/usr/src/paperless/export
      # Correct path to Admin_cloud as found in search
      - /mnt/storage/media/nextcloud/userdata/Admin_cloud/files:/usr/src/paperless/consume
      - /mnt/storage/media/nextcloud/userdata/Admin_cloud/files:/usr/src/paperless/media
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBENGINE: mariadb
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBUSER: ${PAPERLESS_DB_USER}
      PAPERLESS_DBPASS: ${PAPERLESS_DB_PASS}
      PAPERLESS_DBNAME: ${PAPERLESS_DB_NAME}
      
      # Integration with Tika and Gotenberg
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      
      PAPERLESS_OCR_LANGUAGES: ${PAPERLESS_OCR_LANGUAGES}
      PAPERLESS_OCR_LANGUAGE: ${PAPERLESS_OCR_LANGUAGE}
      PAPERLESS_TIME_ZONE: Asia/Jerusalem
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_CSRF_TRUSTED_ORIGINS: ${PAPERLESS_CSRF_TRUSTED_ORIGINS}
      
      # OCR and Consumer settings
      PAPERLESS_CONSUMER_DELETE_ON_SUCCESS: "false"
      PAPERLESS_CONSUMER_RECURSIVE: "true"
      PAPERLESS_CONSUMER_IGNORE_DUPLICATES: "true"
      PAPERLESS_OCR_MODE: "redo"
      PAPERLESS_OCR_USER_ARGS: "--oem 1 --psm 3"
      PAPERLESS_OCR_DESKEW: "true"
      PAPERLESS_OCR_ROTATE_PAGES: "true"
      PAPERLESS_FILENAME_FORMAT: "{{path}}/{{title}}"

networks:
  internal-net:
    external: true
    name: config_nextcloud-net