services:
  paperless-redis:
    image: redis:7
    container_name: paperless-redis
    restart: always
    networks:
      - internal-net

  paperless-db:
    image: mariadb:10.11
    container_name: paperless-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${PAPERLESS_DB_ROOT_PASS}
      - MYSQL_DATABASE=${PAPERLESS_DB_NAME}
      - MYSQL_USER=${PAPERLESS_DB_USER}
      - MYSQL_PASSWORD=${PAPERLESS_DB_PASS}
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - internal-net

  # Office muscles
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: paperless-gotenberg
    restart: always
    command:
      - "gotenberg"
      - "--modules-libreoffice-disable-check-update"
    networks:
      - internal-net

  tika:
    image: apache/tika:latest
    container_name: paperless-tika
    restart: always
    networks:
      - internal-net

  paperless:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    container_name: paperless
    restart: always
    depends_on:
      - paperless-db
      - paperless-redis
      - gotenberg
      - tika
    networks:
      - internal-net
    volumes:
      - ./data:/usr/src/paperless/data
      - ./export:/usr/src/paperless/export
      # Specific path to Documents to avoid Nextcloud system files
      - /mnt/storage/media/nextcloud/userdata/Admin_cloud/files/Documents:/usr/src/paperless/consume
      - /mnt/storage/media/nextcloud/userdata/Admin_cloud/files/Documents:/usr/src/paperless/media
    environment:
      PAPERLESS_REDIS: redis://paperless-redis:6379
      PAPERLESS_DBENGINE: mariadb
      PAPERLESS_DBHOST: paperless-db
      PAPERLESS_DBUSER: ${PAPERLESS_DB_USER}
      PAPERLESS_DBPASS: ${PAPERLESS_DB_PASS}
      PAPERLESS_DBNAME: ${PAPERLESS_DB_NAME}
      
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      
      # FIX: Install Hebrew package on startup
      PAPERLESS_OCR_LANGUAGES: heb eng
      PAPERLESS_OCR_LANGUAGE: heb
      PAPERLESS_OCR_MODE: force
      PAPERLESS_OCR_CLEAN: "true"
      
      PAPERLESS_TIME_ZONE: Asia/Jerusalem
      PAPERLESS_SECRET_KEY: ${PAPERLESS_SECRET_KEY}
      PAPERLESS_CSRF_TRUSTED_ORIGINS: ${PAPERLESS_CSRF_TRUSTED_ORIGINS}
      
      PAPERLESS_CONSUMER_DELETE_ON_SUCCESS: "true"
      PAPERLESS_CONSUMER_RECURSIVE: "true"
      PAPERLESS_CONSUMER_IGNORE_DUPLICATES: "true"
      
      # FIX: Use new non-deprecated OCR settings
      PAPERLESS_OCR_SKIP_ARCHIVE_FILE: never
      
      PAPERLESS_OCR_USER_ARGS: "--oem 1 --psm 3"
      PAPERLESS_FILENAME_FORMAT: "{{path}}/{{title}}"
      USER_ID: 1000
      GROUP_ID: 1000

networks:
  internal-net:
    external: true
    name: config_nextcloud-net